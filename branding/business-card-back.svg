<svg width="1050" height="600" viewBox="0 0 1050 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Business Card Back — Dark version -->
  <rect width="1050" height="600" rx="24" fill="#0E1117"/>

  <!-- Grid pattern -->
  <line x1="0" y1="150" x2="1050" y2="150" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="300" x2="1050" y2="300" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="450" x2="1050" y2="450" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="262" y1="0" x2="262" y2="600" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="525" y1="0" x2="525" y2="600" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="787" y1="0" x2="787" y2="600" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Large mark centered -->
  <rect x="425" y="180" width="200" height="78" rx="12" fill="#0D5C63"/>
  <rect x="425" y="272" width="88" height="100" rx="12" fill="#0D5C63" opacity="0.4"/>
  <rect x="537" y="272" width="88" height="100" rx="12" fill="#C9A84C"/>

  <!-- Wordmark below -->
  <text x="525" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2" fill="rgba(255,255,255,0.9)" text-anchor="middle">KOMISSIO</text>
  <text x="525" y="456" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1.5">OPERATING SYSTEM FOR UAE BUSINESS</text>

  <!-- Bottom URL -->
  <text x="525" y="530" font-family="'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="1">komissio.ae</text>
</svg>